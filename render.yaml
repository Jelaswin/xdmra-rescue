services:
  - type: web
    name: xdmra-backend
    runtime: python
    rootDir: backend
    region: singapore
    plan: free
    branch: master
    autoDeployTrigger: commit

    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /api/health

    envVars:
      - key: ENVIRONMENT
        value: production

      - key: JWT_ALGORITHM
        value: HS256

      - key: ACCESS_TOKEN_EXPIRE_MINUTES
        value: "30"

      - key: REFRESH_TOKEN_EXPIRE_DAYS
        value: "7"

      - key: MIN_PASSWORD_LENGTH
        value: "8"

      - key: DATABASE_URL
        sync: false

      - key: JWT_SECRET
        sync: false

      - key: FRONTEND_ORIGIN
        sync: false

      - key: ALLOWED_ORIGINS
        sync: false